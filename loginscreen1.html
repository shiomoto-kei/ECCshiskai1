<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

<form action="/login" method="POST">
    <h1>株式会社の安否確認</h1>
    <label for="username">社員番号：</label>
    <input type="text" id="username" name="username" placeholder="社員番号を入力してください" required>
    <br><br>

    <label for="password">Password：</label>
    <input type="password" id="password" name="password" placeholder="パスワードを入力してください" required>
    <br><br>

    <button type="submit" name="role" value="login">ログイン</button>
    <button type="submit" name="role" value="admin">管理者としてログイン</button>
</form>

<footer>
</footer>
</body>
</html>
